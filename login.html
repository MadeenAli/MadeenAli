<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>play and bet</title>
</head>

<body>
    <section class="login">
        <div class="container">
            <div class="row justify-content-centre">
                <div class="text-centre">
                    <div class="logo">
                        <img src="assets/images/header-logo.png" alt="logo" />
                    </div>
                    <h2 class="font-48 mb-4">Sign In</h2>
                    <div class="from">
                        <div class="input-wrapper">
                            <input type="text" placeholder="Email Address" />
                        </div>
                        <div class="input-wrapper">
                            <input type="password" placeholder="Password" />
                        </div>
                        <div class="mb-4 text-end">
                            <a class="gold-color font-medium font-18" href="#">Forgot Password?</a>
                        </div>
                        <button class="bg-yellow-gradient ms-4 btn-hover text-white btn-login"
                            type="submit">Login</button>
                        <p class="font-medium font-20 ms-2">Not Registered?<a class="gold-color" href="#">Sign
                                Up</a>here</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
