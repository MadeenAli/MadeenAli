<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap-grid.min.css">
    <title>Play and Bet</title>
</head>

<body>
    <section class="sign-up">
        <div class="container">
            <div class="row justify-content-centre">
                <div class="text-centre">
                    <div class="logo">
                        <img src="assets/images/header-logo.png" alt="logo" />
                    </div>
                    <h2 class="font-48 mb-4">Sign In</h2>
                    <div class="from">
                        <div class="row">
                            <div class="col-12">
                                <div class="input-wrapper">
                                    <input type="text" placeholder="First Name" />
                                </div>
                                <div class="col-12">
                                    <div class="input-wrapper">
                                        <input type="text" placeholder="Last Name" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <div class="input-wrapper">
                                    <input type="text" placeholder="UserName" />
                                </div>
                                <div class="col-12">
                                    <div class="input-wrapper">
                                        <input type="text" placeholder="Email Address" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <div class="input-wrapper">
                                    <input type="date" placeholder="Select date" />
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="input-wrapper">
                                    <input type="text" placeholder="Phone Number" />
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <div class="input-wrapper">
                                    <input type="password" placeholder="Password" />
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="input-wrapper">
                                    <input type="password" placeholder="Conform Password" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="justify-content-centre">
                    <div class="col-12">
                        <button class="bg-yellow-gradient ms-4 btn-hover text-white btn-login" type="submit">Create
                            Account</button>
                    </div>
                    <p class="font-medium font-20 mt-3">
                        Already have an Account?
                        <a class="gold-color" href="#">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
